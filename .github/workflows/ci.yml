name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: ${{ matrix.package }} · Py ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        package: [core, cli, gui]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # PySide6 tests need Qt's Xcb plugin deps; the CLI + core tests don't.
      - name: Install Qt runtime deps (gui only)
        if: matrix.package == 'gui'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libfontconfig1

      - name: Install core (always needed)
        working-directory: core
        run: pip install -e ".[dev]"

      - name: Install cli
        if: matrix.package == 'cli' || matrix.package == 'gui'
        working-directory: cli
        run: pip install -e ".[dev]"

      - name: Install gui
        if: matrix.package == 'gui'
        working-directory: gui
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: ${{ matrix.package }}
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Typecheck (mypy)
        working-directory: ${{ matrix.package }}
        run: mypy --strict src

      - name: Test (pytest)
        working-directory: ${{ matrix.package }}
        env:
          # PySide6 needs an offscreen Qt platform plugin in CI (no display).
          QT_QPA_PLATFORM: offscreen
        run: pytest

  e2e:
    name: E2E (Ubuntu 22.04 container install)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build E2E image
        run: docker build -f tests/e2e/Dockerfile -t benchbox-e2e .

      - name: Run verify.sh inside the image
        run: docker run --rm benchbox-e2e
