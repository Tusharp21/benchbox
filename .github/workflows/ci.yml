name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (core + cli)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install core
        working-directory: core
        run: uv pip install --system -e ".[dev]"

      - name: Install cli
        working-directory: cli
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check core/ cli/
          ruff format --check core/ cli/

      - name: Typecheck (mypy)
        run: |
          mypy core/src
          mypy cli/src

      - name: Test (pytest)
        run: |
          pytest core/tests
          pytest cli/tests
